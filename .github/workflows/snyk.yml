name: Snyk Security Scan

on:
  push:
    branches:
      - master 
      - dev
  pull_request:
    branches:
      - master
      - dev

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Snyk CLI
        run: |
          curl -sL https://static.snyk.io/cli/latest/snyk-linux -o snyk
          chmod u+x snyk

      - name: Run Snyk SCA
        run: ./snyk test --severity-threshold=medium --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk SAST
        run: ./snyk code test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
